<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validation</title>
</head>
<body>
    <h3>Password Validation</h3>
    <form action="post">
        <input type="password" placeholder="Password">
    </form>
    <p id="green_red"></p>
    <script>
        let tex = document.querySelector("input")
        let gr = document.querySelector("#green_red")
        tex.addEventListener("input", function() {
            if (tex.value.length < 6) {
                gr.innerText = "password small"
                gr.style.color = "red"
            } else {
                gr.innerText = "password correct"
                gr.style.color = "green"
            }
            if(tex.value.length === 0){
                gr.style.display = "none"
            }else{
                gr.style.display = "block"
            }
        })
    </script>
</body>
</html>
